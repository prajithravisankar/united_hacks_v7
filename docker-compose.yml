name: boys

# BOYS backing databases — polyglot persistence.
#   mssql  = ledger's OLTP store (escrow, ledger, state machine)  — ARM-native azure-sql-edge
#   oracle = brain's OLAP warehouse (odds, results, model probs)  — ARM-native gvenzl/oracle-free
# Non-default host ports so local DBs never collide.

services:
  mssql:
    # Real SQL Server 2022 under amd64 emulation. azure-sql-edge (ARM-native) is
    # deprecated and core-dumps on current Docker Desktop VMs, so we emulate instead —
    # the reliable way to run SQL Server on Apple Silicon.
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: boys-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}"
    ports:
      - "127.0.0.1:14333:1433"   # loopback only — not reachable off-host
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      # Probe the TDS port with bash /dev/tcp (image-agnostic; the real query check is scripts/check_dbs.sh).
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/1433"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: boys-oracle
    environment:
      ORACLE_PASSWORD: "${ORACLE_PASSWORD:?set ORACLE_PASSWORD in .env}"
      APP_USER: "${ORACLE_APP_USER:-boys}"
      APP_USER_PASSWORD: "${ORACLE_APP_PASSWORD:?set ORACLE_APP_PASSWORD in .env}"
    ports:
      - "127.0.0.1:15211:1521"   # loopback only — not reachable off-host
    volumes:
      - oracle_data:/opt/oracle/oradata
      # gvenzl runs *.sql/*.sh here once, on first initialization of an empty database.
      - ./docker/oracle/init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  # One-shot: load Oracle's warehouse (fact_match) + build the deterministic NAV curve, then exit. Gates
  # brain so the curve exists BEFORE brain lazily caches its quant engine (and before the Go engine fetches
  # it at boot). Reuses the brain image (it already carries the app + oracledb); data/ + DDL are mounted in.
  data-seed:
    image: boys-brain:latest
    container_name: boys-data-seed
    profiles: ["demo"]
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      ORACLE_HOST: oracle
      ORACLE_PORT: "1521"
      ORACLE_APP_USER: "${ORACLE_APP_USER:-boys}"
      ORACLE_APP_PASSWORD: "${ORACLE_APP_PASSWORD:?set ORACLE_APP_PASSWORD in .env}"
      ORACLE_SERVICE: FREEPDB1
      BOYS_RAW_DIR: /seed/raw
      BOYS_DDL_FILE: /ddl/01_warehouse.sql
    volumes:
      - ./data:/seed:ro
      - ./docker/oracle/init:/ddl:ro
    command: ["sh", "-c", "python -m app.data.seed_oracle && python -m app.quant.build"]
    restart: "no"

  brain:
    build: ./services/brain
    image: boys-brain:latest
    container_name: boys-brain
    profiles: ["demo"]
    depends_on:
      oracle:
        condition: service_healthy
      data-seed:
        condition: service_completed_successfully
    environment:
      ENV: local
      ORACLE_HOST: oracle
      ORACLE_PORT: "1521"
      ORACLE_APP_USER: "${ORACLE_APP_USER:-boys}"
      ORACLE_APP_PASSWORD: "${ORACLE_APP_PASSWORD:?set in .env}"
      ORACLE_SERVICE: FREEPDB1
      HTTP_PORT: "8081"
      GRPC_PORT: "50061"
      AI_MODE: seeded
    ports:
      - "127.0.0.1:8081:8081"     # http health
      - "127.0.0.1:50061:50061"   # gRPC
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8081/health/ready',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # One-shot: apply SQL Server migrations, then exit. Gates the ledger API so its schema always exists.
  ledger-migrate:
    build:
      context: .
      dockerfile: services/ledger/Dockerfile
    image: boys-ledger:latest
    container_name: boys-ledger-migrate
    profiles: ["demo"]
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      MSSQL_HOST: mssql
      MSSQL_PORT: "1433"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}"
    command: ["dotnet", "migrate/Boys.Ledger.Migrations.dll"]
    restart: "no"

  ledger:
    image: boys-ledger:latest     # built by ledger-migrate above (same Dockerfile)
    container_name: boys-ledger
    profiles: ["demo"]
    depends_on:
      mssql:
        condition: service_healthy
      ledger-migrate:
        condition: service_completed_successfully
      brain:
        condition: service_started   # brain is optional at the edge (degraded-tolerant), so don't block on its health
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Ledger__SqlConnectionString: "Server=mssql,1433;Database=boys;User Id=sa;Password=${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env};TrustServerCertificate=True;Encrypt=False;Connect Timeout=10"
      Ledger__BrainGrpcAddress: "http://brain:50061"
      Ledger__BrainTimeoutMs: "3000"
      # Demo log hygiene: silence per-request/routing chatter so `docker logs boys-ledger` shows only the
      # meaningful events (goal created, referee decision, degraded) on camera.
      Logging__LogLevel__Default: "Information"
      Logging__LogLevel__Microsoft.AspNetCore: "Warning"
      Logging__LogLevel__System.Net.Http.HttpClient: "Warning"
    ports:
      - "127.0.0.1:8080:8080"     # ledger http (health now; REST in B16)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  engine:
    build: ./services/engine
    container_name: boys-engine
    profiles: ["demo"]
    depends_on:
      brain:
        condition: service_healthy
    environment:
      BRAIN_GRPC_ADDRESS: "brain:50061"
      ENGINE_HTTP_ADDR: ":8090"
      ENGINE_GRPC_ADDR: ":50071"
      DEMO_COMMITMENT_ID: "1"
      LOG_LEVEL: info
      ENGINE_ENABLE_PPROF: "${ENGINE_ENABLE_PPROF:-0}"   # opt-in profiling (loopback-only); on for the R5 soak
    ports:
      - "127.0.0.1:8090:8090"     # health + WebSocket live stream (B19)
      - "127.0.0.1:50071:50071"   # EngineService gRPC
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8090/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # The edge: single origin the board talks to. /api → ledger, /ws → engine (board later). No CORS needed.
  nginx:
    image: nginx:1.27-alpine
    container_name: boys-nginx
    profiles: ["demo"]
    depends_on:
      ledger:
        condition: service_healthy
      engine:
        condition: service_healthy
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:8888:80"       # the demo/front-door origin
    healthcheck:
      # 127.0.0.1 (not localhost): busybox wget resolves localhost to IPv6 ::1, but nginx listens on IPv4.
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mssql_data:
  oracle_data:
