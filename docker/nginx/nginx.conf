# BOYS edge — the single origin the board (frontend) talks to. Because everything is one origin here, the
# browser needs no CORS: /api reaches the ledger, /ws reaches the engine, / will serve the board (later track).
worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    access_log    off;                       # demo hygiene: the edge stays quiet; services own their logs

    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 512;

    # WebSocket upgrade plumbing: echo the client's Upgrade, and set Connection accordingly.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream ledger { server ledger:8080; }
    upstream engine { server engine:8090; }

    server {
        listen 80;

        # Edge health — is the API backend ready? (proxies the ledger's readiness probe under one edge URL.)
        location = /api/health {
            proxy_pass http://ledger/health/ready;
        }

        # REST API → ledger. The ledger already serves everything under /api, so the URI passes through as-is.
        location /api/ {
            proxy_pass http://ledger;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket live NAV stream → engine (/ws/live?goal=…). Long-lived, so relax the read timeout.
        location /ws/ {
            proxy_pass http://engine;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Board (frontend) — a later track. For now the edge just confirms it's alive.
        location / {
            default_type text/plain;
            return 200 "BOYS edge is live. REST at /api, WebSocket at /ws/live?goal=<id>.\n";
        }
    }
}
